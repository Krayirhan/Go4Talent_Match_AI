services:
  # ── Frontend — Next.js ──────────────────────────────────────────────────
  - type: web
    name: go4talent-frontend
    runtime: node
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false   # Render dashboard'da elle gir: https://go4talent-backend.onrender.com
      - key: NEXT_PUBLIC_ML_URL
        sync: false   # Render dashboard'da elle gir: https://go4talent-ml.onrender.com

  # ── Backend — Fastify ───────────────────────────────────────────────────
  - type: web
    name: go4talent-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false   # Elle gir
      - key: SUPABASE_SERVICE_KEY
        sync: false   # Elle gir (service role key)
      - key: ML_SERVICE_URL
        sync: false   # Elle gir: https://go4talent-ml.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false   # Elle gir: https://go4talent-frontend.onrender.com

  # ── ML Service — FastAPI ────────────────────────────────────────────────
  - type: web
    name: go4talent-ml
    runtime: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false   # Elle gir: https://go4talent-frontend.onrender.com,https://go4talent-backend.onrender.com
